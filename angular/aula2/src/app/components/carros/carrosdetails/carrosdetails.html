<br />

<div class="container">
  <div class="row">

    <div class="col-lg-12">
      <div class="card">

        <div class="card-body">

          <h3>Cadastro de Carro:</h3>

          <br />

          <!-- NOME -->
          <div class="form-outline mb-4" data-mdb-input-init>

            <input
              type="text"
              class="form-control"
              [(ngModel)]="carro.nome"
              [ngModelOptions]="{standalone: true}">

            <label class="form-label">
              Nome
            </label>

          </div>

          <!-- BOTÃO MARCA -->
          <div class="mb-3">

            @if(carro.marca == null){

              <button
                type="button"
                class="btn btn-primary btn-rounded w-100"
                mdbRipple
                (click)="buscarMarca()">

                Buscar Marca

              </button>

            } @else {

              <p class="text-primary alert-primary">Marca: {{carro.marca.nome}}</p>
              <button
                type="button"
                class="btn btn-primary btn-rounded w-100"
                mdbRipple
                (click)="buscarMarca()">

                Trocar Marca

              </button>

            }

          </div>

          <br>

          <div class="mb-3">

      

              <button
                type="button"
                class="btn btn-primary btn-rounded w-100"
                mdbRipple
                (click)="buscarAcessorio()">

                Buscar Acessórios

              </button>

              <br>


              <table class="table table-striped table-hover align-middle">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody>
              @for (acessorio of carro.acessorios; track $index) {
                <tr>
                  <td>{{ acessorio.id }}</td>

                  <td>{{ acessorio.nome }}</td>

                  <td class="text-end">
                    

                      <button class="btn btn-danger btn-sm" (click)="desvincularAcessorioCarro(acessorio)">
                        Deletar
                      </button>
                    
                  </td>
                </tr>
              }
            </tbody>
          </table>

            

             

          </div>

          <br>

          <!-- BOTÃO SALVAR -->
          <button
            type="button"
            class="btn btn-success btn-rounded w-100"
            mdbRipple 
            (click)="save()">

            Salvar

          </button>

        </div>

      </div>
    </div>

  </div>
</div>



<ng-template #modalMarca>
  <div class="modal-header">
    <h5 class="modal-title" id="exampleModalLabel">Marcas</h5>
    <button type="button" class="btn-close" aria-label="Close" (click)="modalRef.close()"></button>
  </div>
  <div class="modal-body">

    <app-marcaslist [esconderBotoes]="true" (retorno)="retornoMarca($event)"></app-marcaslist>
    <!--o $event vai ficar dando erro até ter um emit lá no método-->

  </div>
</ng-template>



<ng-template #modalAcessorios>
  <div class="modal-header">
    <h5 class="modal-title" id="exampleModalLabel">Acessórios</h5>
    <button type="button" class="btn-close" aria-label="Close" (click)="modalRef.close()"></button>
  </div>
  <div class="modal-body">

    <app-acessorioslist [esconderBotoes]="true" (retorno)="retornoAcessorio($event)"></app-acessorioslist>
    <!--o $event vai ficar dando erro até ter um emit lá no método-->

  </div>
</ng-template>
