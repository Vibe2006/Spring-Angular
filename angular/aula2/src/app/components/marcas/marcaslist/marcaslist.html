<br />

<div class="container carros-container">
  <div class="row">
    <div class="col-lg-12">

      <div class="card carros-card">

        <div class="card-body">

          <div class="titulo-area">

            <h3 class="titulo">🏷️ Lista de Marcas</h3>

            <button
              class="btn btn-success btn-novo"
              mdbRipple
              (click)="new()"
            >
              Nova Marca
            </button>

          </div>

          <div class="table-responsive">

            <table class="table tabela-carros align-middle">

              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nome</th>
                  <th>CNPJ</th>
                  <th class="text-end">Ações</th>
                </tr>
              </thead>

              <tbody>

                @for (marca of lista; track $index) {

                <tr>

                  <td>{{ marca.id }}</td>

                  <td>{{ marca.nome }}</td>

                  <td>{{ marca.cnpj }}</td>

                  <td class="text-end">

                    @if (esconderBotoes) {

                      <button
                        class="btn btn-primary btn-sm btn-acao"
                        (click)="select(marca)"
                      >
                        Selecionar
                      </button>

                    } @else {

                      <button
                        class="btn btn-primary btn-sm me-2 btn-acao"
                        (click)="edit(marca)"
                      >
                        Editar
                      </button>

                      <button
                        class="btn btn-danger btn-sm btn-acao"
                        (click)="deleteById(marca)"
                      >
                        Deletar
                      </button>

                    }

                  </td>

                </tr>

                }

              </tbody>

            </table>

          </div>

        </div>

      </div>

    </div>
  </div>
</div>

<ng-template #modalMarcaDetalhe>

  <div class="modal-header">

    <h5 class="modal-title">
      Cadastro de Marca
    </h5>

    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modalRef.close()">
    </button>

  </div>

  <div class="modal-body">

    <app-marcasdetails
      [marca]="marcaEdit"
      (retorno)="retornoDetalhe($event)">
    </app-marcasdetails>

  </div>

</ng-template>
